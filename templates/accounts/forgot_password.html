{% extends "base_auth.html" %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
<div class="mb-4">
    <h3 class="fw-bold mb-1">Reset your password</h3>
    <p class="text-secondary-2">Enter your email and we'll send you a reset link.</p>
</div>
<form method="post" novalidate>
    {% csrf_token %}
    <div class="mb-3">
        <label class="form-label" for="{{ form.email.id_for_label }}">Email address</label>
        {{ form.email }}
        {% for error in form.email.errors %}<div class="text-danger small mt-1">{{ error }}</div>{% endfor %}
    </div>
    <button type="submit" class="btn btn-gradient w-100 py-2 fw-semibold"><i class="fa-solid fa-paper-plane me-2"></i>Send reset link</button>
</form>
<div class="text-center mt-4">
    <a href="{% url 'accounts:login' %}" class="small"><i class="fa-solid fa-arrow-left me-1"></i>Back to sign in</a>
</div>
{% endblock %}
