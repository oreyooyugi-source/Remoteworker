{% extends "base.html" %}
{% block title %}Request Leave{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-7">
<div class="card">
    <div class="card-header"><i class="fa-solid fa-plane-departure me-2"></i>Request Leave</div>
    <div class="card-body">
        <form method="post" novalidate>
            {% csrf_token %}
            {% include "partials/form_fields.html" %}
            <div class="mt-4 d-flex gap-2">
                <button type="submit" class="btn btn-primary"><i class="fa-solid fa-paper-plane me-2"></i>Submit Request</button>
                <a href="{% url 'attendance:leave_list' %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
</div></div>
{% endblock %}
