{% extends "base.html" %}
{% block title %}Notification Preferences{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-8">
<div class="card">
    <div class="card-header"><i class="fa-solid fa-sliders me-2"></i>Notification Preferences</div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {% include "partials/form_fields.html" %}
            <button type="submit" class="btn btn-primary mt-3"><i class="fa-solid fa-check me-2"></i>Save Preferences</button>
        </form>
    </div>
</div>
</div></div>
{% endblock %}
