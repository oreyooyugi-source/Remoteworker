{% extends "base.html" %}
{% block title %}New Announcement{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-8">
<div class="card">
    <div class="card-header"><i class="fa-solid fa-bullhorn me-2"></i>New Announcement</div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {% include "partials/form_fields.html" %}
            <div class="mt-4 d-flex gap-2">
                <button type="submit" class="btn btn-primary"><i class="fa-solid fa-paper-plane me-2"></i>Publish</button>
                <a href="{% url 'notifications:announcements' %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
</div></div>
{% endblock %}
