{% extends "base.html" %}
{% block title %}Add Time Entry{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-7">
<div class="card">
    <div class="card-header"><i class="fa-solid fa-stopwatch me-2"></i>Add Manual Time Entry</div>
    <div class="card-body">
        <form method="post" novalidate>
            {% csrf_token %}
            {% include "partials/form_fields.html" %}
            <div class="mt-4 d-flex gap-2">
                <button type="submit" class="btn btn-primary"><i class="fa-solid fa-check me-2"></i>Add Entry</button>
                <a href="{% url 'timetracking:dashboard' %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
</div></div>
{% endblock %}
